name: Deploy StockWise to Google Cloud Run

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Google Auth
      id: 'auth'
      uses: 'google-github-actions/auth@v1'
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: 'google-github-actions/setup-gcloud@v1'
      with:
        version: 'latest'
        project_id: ${{ secrets.GCP_PROJECT_ID }}

    - name: Configure Docker to use gcloud as a credential helper
      run: gcloud auth configure-docker

    - name: Build and push Docker image
      run: |
        docker build -f Dockerfile.cloudrun -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/stockwise:${{ github.sha }} .
        docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/stockwise:${{ github.sha }}

    - name: Deploy to Cloud Run
      run: |
        gcloud run deploy stockwise \
          --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/stockwise:${{ github.sha }} \
          --region us-central1 \
          --platform managed \
          --allow-unauthenticated \
          --set-env-vars CLOVER_API_KEY=${{ secrets.CLOVER_API_KEY }},MERCHANT_ID=${{ secrets.MERCHANT_ID }} \
          --port 8080
