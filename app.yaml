# Google Cloud Run 部署配置
runtime: python310

# 环境变量 (部署时设置)
env_variables:
  PORT: 8080

# 实例配置
instance_class: F1

# 自动扩缩容
automatic_scaling:
  min_instances: 0
  max_instances: 10
  target_cpu_utilization: 0.65

# 健康检查
health_check:
  enable_health_check: True

# 资源限制
resources:
  cpu: 1
  memory_gb: 1
  disk_size_gb: 10
