version: '3.8'

services:
  stockwise:
    build: .
    ports:
      - "8501:8501"
    environment:
      - CLOVER_API_KEY=${CLOVER_API_KEY}
      - MERCHANT_ID=${MERCHANT_ID}
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501"]
      interval: 30s
      timeout: 10s
      retries: 3
